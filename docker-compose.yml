services:
  db:
    image: postgres:17

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: etpr1996
      POSTGRES_DB: ecommerce

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .

    depends_on:
      - db

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    env_file:
      - .env

volumes:
  postgres_data: